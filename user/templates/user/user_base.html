{% load static %}
<!DOCTYPE html>
<html lang="en" 
    x-data="{ darkMode: document.documentElement.classList.contains('dark') }" 
    x-init="$watch('darkMode', val => { 
        localStorage.setItem('theme', val ? 'dark' : 'light');
        if (val) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    })"
    :class="{ 'dark': darkMode }">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Altair — Dashboard{% endblock %}</title>
    <link rel="icon" type="image/jpeg" href="{% static 'img/logo.jpg' %}">
    <meta name="description" content="Altair Finance — Command Center.">
    
    <!-- Instant Obsidian Protocol Sync (Prevents White Flash) -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% block extra_head %}{% endblock %}

    <!-- GLOBAL OBSIDIAN ASSETS (Scrollbar & Core Behavior) -->
    <style>
        [x-cloak] { display: none !important; }

        /* Aggressive Obsidian Terminal Scrollbar Control */
        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
        }
        *::-webkit-scrollbar-track {
            background: #0f172a !important; /* Slate-900 */
        }
        *::-webkit-scrollbar-thumb {
            background: #ffffff !important; /* Pure Obsidian White */
            border-radius: 100px !important;
            border: 3px solid #0f172a !important; /* Padding effect */
        }
        *::-webkit-scrollbar-thumb:hover {
            background: #e2e8f0 !important;
        }

        /* Prevent Bouncy 'Overscroll' at Page Ends */
        html, body, main {
            overscroll-behavior: none !important;
            overscroll-behavior-y: none !important;
        }

        /* Firefox Compatibility */
        * {
            scrollbar-width: thin;
            scrollbar-color: #ffffff #0f172a;
        }
    </style>
</head>

<body class="font-sans flex flex-col h-screen overflow-hidden bg-gray-50 dark:bg-slate-950 transition-colors duration-300" x-data="{ upgradeVisible: true }">

    <!--Head Nav Bar (Full Width Horizon)-->
    {% include "user/partials/header.html" %}

    <!-- Main Terminal Registry (Sidebar + Content Cluster) -->
    <div class="flex flex-1 overflow-hidden">
        <!--Side Nav Bar-->
        {% include "user/partials/sidebar.html" %}

        <!--Main Page Content Node-->
        <main class="ml-64 flex-1 p-6 overflow-y-auto bg-gray-50 dark:bg-slate-950 transition-colors duration-300 overscroll-none" id="page-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <!--END (Head Nav Bar)-->

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>lucide.createIcons();</script>
    {% block extra_scripts %}{% endblock %}

</body>

</html>
