<header
    class="sticky top-0 z-50 bg-white/5 backdrop-blur-lg border-b border-white/10 px-[5%] py-4 flex justify-between items-center">
    <div class="text-2xl font-bold tracking-widest text-white">ALTAIR</div>

    <nav class="relative">
        <!-- Navigation -->
        <ul class="flex space-x-8 items-center">
            <li><a href="/" class="text-white hover:text-altair-primary transition-colors font-medium">Home</a></li>
            {% if user.is_authenticated %}
            {% if user.role == 'manager' or user.role == 'superuser' %}
            <li><a href="{% url 'manager_dashboard:overview' %}"
                    class="text-white hover:text-altair-primary transition-colors font-medium">Dashboard</a></li>
            {% else %}
            <li><a href="{% url 'user_dashboard:dashboard' %}"
                    class="text-white hover:text-altair-primary transition-colors font-medium">Dashboard</a></li>
            {% endif %}
            <li><a href="{% url 'accounts:logout' %}"
                    class="px-5 py-2 rounded-full border border-white/10 text-white font-semibold hover:bg-white/5 transition-colors">Logout</a>
            </li>
            {% else %}
            <li><a href="{% url 'accounts:login' %}"
                    class="px-5 py-2 rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-semibold hover:opacity-90 transition-opacity">Login</a>
            </li>
            {% endif %}
        </ul>
    </nav>
</header>
