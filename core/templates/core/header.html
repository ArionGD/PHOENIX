<header
    class="sticky top-0 z-50 bg-white/5 backdrop-blur-lg border-b border-white/10 px-[5%] py-4 flex justify-between items-center">
    <div class="text-2xl font-bold tracking-widest text-white">ALTAIR</div>

    <nav x-data="{ open: false }" class="relative">
        <!-- Mobile Menu Button -->
        <button @click="open = !open" class="md:hidden text-white focus:outline-none">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path x-show="!open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16" />
                <path x-show="open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <!-- Desktop Navigation -->
        <ul class="hidden md:flex space-x-8">
            <li><a href="/" class="text-white hover:text-altair-primary transition-colors font-medium">Home</a></li>
            <li><a href="#" class="text-white hover:text-altair-primary transition-colors font-medium">Portfolio</a>
            </li>
            <li><a href="#" class="text-white hover:text-altair-primary transition-colors font-medium">Tax</a></li>
            <li><a href="#" class="text-white hover:text-altair-primary transition-colors font-medium">Advisor</a></li>
        </ul>

        <!-- Mobile Navigation -->
        <div x-show="open" @click.away="open = false" x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
            class="absolute right-0 mt-4 w-48 bg-altair-card border border-white/10 rounded-xl shadow-xl md:hidden">
            <ul class="p-2 space-y-1">
                <li><a href="/" class="block px-4 py-2 text-white hover:bg-white/5 rounded-lg">Home</a></li>
                <li><a href="#" class="block px-4 py-2 text-white hover:bg-white/5 rounded-lg">Portfolio</a></li>
                <li><a href="#" class="block px-4 py-2 text-white hover:bg-white/5 rounded-lg">Tax</a></li>
                <li><a href="#" class="block px-4 py-2 text-white hover:bg-white/5 rounded-lg">Advisor</a></li>
            </ul>
        </div>
    </nav>
</header>
