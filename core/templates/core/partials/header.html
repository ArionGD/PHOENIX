{% load static %}
<header class="sticky top-0 z-[100] w-full border-b border-white/5 bg-black/40 backdrop-blur-2xl shadow-2xl">
    <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent opacity-50"></div>
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between font-bold">
        <!-- Logo Left (Identity) -->
        <a href="/" class="flex items-center gap-4 no-underline group flex-1">
            <div class="w-11 h-11 rounded-full border border-white/10 overflow-hidden shadow-2xl p-0.5 bg-white/5 group-hover:scale-110 transition-transform duration-700">
                <img src="{% static 'img/phoneix.jpg' %}" alt="PHOENIX" class="w-full h-full object-cover rounded-full">
            </div>
            <span class="text-xl font-black text-white tracking-[0.3em] uppercase transition-all duration-700 font-syncopate">PHOENIX</span>
        </a>

        <!-- Nexus Center (Navigation) -->
        <div class="hidden md:flex items-center justify-center gap-12 flex-1 font-outfit">
            <a href="/" class="text-[11px] font-black text-gray-400 hover:text-white transition-colors uppercase tracking-[0.4em]">Home</a>
            <a href="{% url 'support' %}" class="text-[11px] font-black text-gray-400 hover:text-white transition-colors uppercase tracking-[0.4em]">Support</a>
        </div>

        <!-- Nexus Right (Protocol) -->
        <nav class="hidden md:flex items-center justify-end flex-1">
            {% if user.is_authenticated %}
                <div class="relative" x-data="{ open: false }" @click.away="open = false">
                    <button @click="open = !open" 
                        class="flex items-center gap-3 p-1 pr-4 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 transition-all active:scale-95 group shadow-xl">
                        <div class="w-9 h-9 rounded-full overflow-hidden border border-white/20 shadow-lg flex items-center justify-center bg-blue-500 text-white font-black text-sm">
                            {% if user.profile_pic %}
                                <img src="{{ user.profile_pic.url }}" alt="{{ user.username }}" class="w-full h-full object-cover">
                            {% else %}
                                {{ user.username|first|upper }}
                            {% endif %}
                        </div>
                        <span class="text-[10px] font-black text-gray-400 group-hover:text-white uppercase tracking-widest">{{ user.username }}</span>
                        <i data-lucide="chevron-down" class="w-3 h-3 text-gray-500 transition-transform" :class="open ? 'rotate-180' : ''"></i>
                    </button>

                    <!-- Dropdown Console -->
                    <div x-show="open" 
                        x-transition:enter="transition ease-out duration-300"
                        x-transition:enter-start="opacity-0 translate-y-4 scale-95"
                        x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                        class="absolute right-0 mt-4 w-56 rounded-2xl border border-white/10 bg-[#020617]/90 backdrop-blur-3xl p-2 shadow-2xl z-[200]">
                        
                        <div class="px-3 py-2 border-b border-white/5 mb-2">
                             <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Protocol Role</p>
                             <p class="text-[11px] font-black text-blue-400 mt-0.5 uppercase tracking-widest">{{ user.role }}</p>
                        </div>

                        {% if user.role == 'admin' or user.is_staff %}
                        <a href="{% url 'dashboard_admin:overview' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition-all group">
                            <i data-lucide="layout-dashboard" class="w-4 h-4 opacity-50 group-hover:opacity-100"></i>
                            <span class="text-xs font-black uppercase tracking-widest">Nexus Console</span>
                        </a>
                        {% else %}
                        <a href="{% url 'user:dashboard' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition-all group">
                            <i data-lucide="user" class="w-4 h-4 opacity-50 group-hover:opacity-100"></i>
                            <span class="text-xs font-black uppercase tracking-widest">User Dashboard</span>
                        </a>
                        {% endif %}

                        <a href="{% url 'accounts:logout' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-rose-500/10 text-rose-500 transition-all group mt-1">
                            <i data-lucide="log-out" class="w-4 h-4"></i>
                            <span class="text-xs font-black uppercase tracking-widest">Terminate Session</span>
                        </a>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'accounts:login' %}" 
                    class="px-8 py-3 rounded-xl bg-blue-600 text-white text-[10px] font-black uppercase tracking-[0.2em] hover:bg-blue-500 transition-all shadow-2xl shadow-blue-500/20 active:scale-95">
                    Login
                </a>
            {% endif %}
        </nav>
    </div>
</header>
