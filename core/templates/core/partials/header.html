{% load static %}
<header class="sticky top-0 z-[100] w-full border-b border-white/5 bg-black/40 backdrop-blur-2xl shadow-2xl">
    <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent opacity-50"></div>
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <!-- Logo Engine -->
        <a href="/" class="flex items-center gap-4 no-underline group">
            <div class="w-12 h-12 rounded-full border border-white/10 overflow-hidden shadow-2xl shadow-indigo-500/20 group-hover:scale-110 transition-transform duration-700 p-0.5 bg-white/5">
                <img src="{% static 'img/phoneix.jpg' %}" alt="PHOENIX" class="w-full h-full object-cover rounded-full">
            </div>
            <span class="text-2xl font-black text-white tracking-[0.3em] uppercase group-hover:tracking-[0.35em] transition-all duration-700">PHOENIX</span>
        </a>

        <!-- Nexus Navigation -->
        <nav class="hidden md:flex items-center gap-10">
            <a href="/" class="text-sm font-bold text-gray-400 hover:text-white transition-colors uppercase tracking-widest">Home</a>
            {% if user.is_authenticated %}
                {% if user.role == 'admin' or user.is_staff %}
                    <a href="{% url 'dashboard_admin:overview' %}" class="text-sm font-bold text-gray-400 hover:text-white transition-colors uppercase tracking-widest">Nexus Console</a>
                {% else %}
                    <a href="{% url 'user:dashboard' %}" class="text-sm font-bold text-gray-400 hover:text-white transition-colors uppercase tracking-widest">Dashboard</a>
                {% endif %}
                <a href="{% url 'accounts:logout' %}" 
                    class="px-6 py-2.5 rounded-xl border border-white/10 bg-white/5 text-white text-xs font-black uppercase tracking-widest hover:bg-white/10 hover:border-white/20 transition-all shadow-xl">
                    Terminate
                </a>
            {% else %}
                <a href="{% url 'accounts:login' %}" 
                    class="px-8 py-3 rounded-xl bg-white text-black text-xs font-black uppercase tracking-widest hover:bg-indigo-50 transition-all shadow-xl shadow-white/5 active:scale-95">
                    Initialize
                </a>
            {% endif %}
        </nav>
    </div>
</header>
