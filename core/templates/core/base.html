{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-auto min-h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Altair - Your AI-powered financial assistant for portfolio analysis, tax optimization.">
    <meta name="keywords" content="finance, portfolio, tax calculator, investment tracker">
    <title>{% block title %}Altair | Oracle{% endblock %}</title>
    <link rel="icon" type="image/jpeg" href="{% static 'img/logo.jpg' %}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <!-- Tailwind Play CDN (Development only) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Custom Styling Engine -->
    <style>
        .font-syncopate { font-family: 'Syncopate', sans-serif; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }

        /* Obsidian Terminal Global Scrollbar Control */
        ::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a !important; /* Slate-900 */
        }
        ::-webkit-scrollbar-thumb {
            background: #ffffff !important; /* Pure White Thumb */
            border-radius: 100px !important;
            border: 3px solid #0f172a !important;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #e2e8f0 !important;
        }

        /* Prevent Bouncy 'Overscroll' Behavior Entirely */
        html, body, main {
            overscroll-behavior: none !important;
            overscroll-behavior-y: none !important;
            scrollbar-width: thin;
            scrollbar-color: #ffffff #0f172a;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>

<body class="min-h-screen flex flex-col font-sans bg-[#020617] text-white overflow-y-auto overflow-x-hidden overscroll-none" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    
    <!-- Head Nav Hub -->
    {% include "core/partials/header.html" %}

    <!-- Main Horizon Node -->
    <main class="flex-grow w-full pt-20">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Global Footer Registry Node -->
    {% include "core/partials/footer.html" %}

    {% block extra_js %}{% endblock %}
</body>

</html>
