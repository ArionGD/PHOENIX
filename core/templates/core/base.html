<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Altair - Your AI-powered financial assistant for portfolio analysis, tax optimization, and goal tracking.">
    <meta name="keywords" content="finance, assistant, portfolio, tax calculator, investment tracker, django">
    <title>{% block title %}Altair | Oracle{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind Play CDN (Development only) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    {% block extra_css %}{% endblock %}
</head>

<body class="h-full flex flex-col font-sans" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    {% include "core/partials/header.html" %}

    <main class="flex-grow w-full">
        {% block content %}
        {% endblock %}
    </main>

    {% include "core/partials/footer.html" %}

    {% block extra_js %}{% endblock %}
</body>

</html>
