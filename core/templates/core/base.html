<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Altair - Your AI-powered financial assistant for portfolio analysis, tax optimization, and goal tracking.">
    <meta name="keywords" content="finance, assistant, portfolio, tax calculator, investment tracker, django">
    <title>{% block title %}Altair | Financial Assistant{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind Play CDN (Development only) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'altair-bg': '#0d1117',
                        'altair-card': '#161b22',
                        'altair-primary': '#00d4ff',
                        'altair-accent': '#7000ff',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        html {
            height: 100%;
            overscroll-behavior: none;
            overscroll-behavior-y: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: white;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        }

        .glass-card {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-0.25rem);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: linear-gradient(to right, #00d4ff, #7000ff);
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body class="dark" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    {% include "core/header.html" %}

    <main class="flex-grow w-full">
        {% block content %}
        {% endblock %}
    </main>

    {% include "core/footer.html" %}

    {% block extra_js %}{% endblock %}
</body>

</html>
